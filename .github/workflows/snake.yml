name: Generate Datas
on:
  schedule: # Her 12 saatte bir günceller
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # 1. Adım: VIP Token ile tüm repoları okuyup yılanı oluşturur
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: bedirhanorseloglu
          github_token: ${{ secrets.SNAKE_TOKEN }}
          svg_out_path: dist/github-contribution-grid-snake-dark.svg

      # 2. Adım: Oluşturulan dosyayı 'output' dalına kaydeder
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
